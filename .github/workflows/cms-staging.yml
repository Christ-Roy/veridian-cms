name: CMS Staging (dev server)

# Convention officielle Veridian (CI-ARCHITECTURE.md §9) :
#   - 1 stack staging fixe sur cms.staging.veridian.site
#   - Trigger : push sur branche `staging`
#   - Deploy via SSH dev-pub → docker compose up (Traefik staging-edge)
#   - DB Postgres locale à la stack, restorée depuis snapshot prod anonymisé
#     (à câbler dans une 2e itération, V1 = DB vierge + seed minimal)

on:
  push:
    branches: [staging]
    paths-ignore:
      - 'todo/**'
      - 'docs/**'
      - 'runbooks/**'
      - '_archive/**'
      - '**/*.md'
  workflow_dispatch:

concurrency:
  group: cms-staging-deploy
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: christ-roy/veridian-cms
  STAGING_DIR: /opt/staging/cms
  STAGING_URL: https://cms.staging.veridian.site

permissions:
  contents: write
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: |
      vars.STAGING_HOST != '' && vars.STAGING_USER != ''
    steps:
      - uses: actions/checkout@v6

      - name: Compute image tag
        id: tag
        run: |
          SHA7=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "image-tag=staging-$SHA7" >> $GITHUB_OUTPUT

      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push staging image (runner + builder)
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 25
          max_attempts: 3
          retry_wait_seconds: 30
          retry_on: error
          command: |
            # Runner (image de prod)
            docker buildx build \
              --target runner \
              --push \
              -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.image-tag }} \
              -f ./Dockerfile \
              .
            # Builder (image complète avec pnpm + payload CLI pour migrate)
            docker buildx build \
              --target builder \
              --push \
              -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-builder:${{ steps.tag.outputs.image-tag }} \
              -f ./Dockerfile \
              .

      - name: Setup SSH
        env:
          SSH_KEY: ${{ secrets.STAGING_SSH_KEY }}
          DEV_HOST: ${{ vars.STAGING_HOST }}
        run: |
          MISSING=""
          [ -z "$SSH_KEY" ] && MISSING="$MISSING STAGING_SSH_KEY"
          [ -z "$DEV_HOST" ] && MISSING="$MISSING STAGING_HOST"
          if [ -n "$MISSING" ]; then
            echo "::error::Staging credentials missing:$MISSING"
            exit 1
          fi
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/staging_key
          chmod 600 ~/.ssh/staging_key
          ssh-keyscan -H "$DEV_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy stack
        env:
          DEV_HOST: ${{ vars.STAGING_HOST }}
          DEV_USER: ${{ vars.STAGING_USER }}
          IMAGE_TAG: ${{ steps.tag.outputs.image-tag }}
          PAYLOAD_SECRET: ${{ secrets.STAGING_PAYLOAD_SECRET }}
          POSTGRES_PASSWORD: ${{ secrets.STAGING_POSTGRES_PASSWORD }}
          SMTP_HOST: ${{ secrets.STAGING_SMTP_HOST }}
          SMTP_PORT: ${{ secrets.STAGING_SMTP_PORT }}
          SMTP_USER: ${{ secrets.STAGING_SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.STAGING_SMTP_PASSWORD }}
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/staging_key "$DEV_USER@$DEV_HOST" "mkdir -p ${{ env.STAGING_DIR }}/compose"
          scp -i ~/.ssh/staging_key compose/base.yml "$DEV_USER@$DEV_HOST:${{ env.STAGING_DIR }}/compose/"
          scp -i ~/.ssh/staging_key compose/staging.yml "$DEV_USER@$DEV_HOST:${{ env.STAGING_DIR }}/compose/"

          ENVFILE="$(mktemp)"
          {
            printf 'CMS_IMAGE_TAG=%s\n' "$IMAGE_TAG"
            printf 'PAYLOAD_SECRET=%s\n' "$PAYLOAD_SECRET"
            printf 'POSTGRES_PASSWORD=%s\n' "$POSTGRES_PASSWORD"
            printf 'SMTP_HOST=%s\n' "${SMTP_HOST:-}"
            printf 'SMTP_PORT=%s\n' "${SMTP_PORT:-587}"
            printf 'SMTP_USER=%s\n' "${SMTP_USER:-}"
            printf 'SMTP_PASSWORD=%s\n' "${SMTP_PASSWORD:-}"
          } > "$ENVFILE"
          scp -i ~/.ssh/staging_key "$ENVFILE" "$DEV_USER@$DEV_HOST:${{ env.STAGING_DIR }}/.env"
          rm -f "$ENVFILE"
          ssh -i ~/.ssh/staging_key "$DEV_USER@$DEV_HOST" "chmod 600 ${{ env.STAGING_DIR }}/.env"

          ssh -i ~/.ssh/staging_key "$DEV_USER@$DEV_HOST" \
            "cd ${{ env.STAGING_DIR }} && docker compose -p cms-staging --env-file .env -f compose/base.yml -f compose/staging.yml pull"

          # 1. Démarrer Postgres seul + attendre healthy
          ssh -i ~/.ssh/staging_key "$DEV_USER@$DEV_HOST" \
            "cd ${{ env.STAGING_DIR }} && docker compose -p cms-staging --env-file .env -f compose/base.yml -f compose/staging.yml up -d cms-postgres"
          ssh -i ~/.ssh/staging_key "$DEV_USER@$DEV_HOST" '
            for i in $(seq 1 20); do
              if docker exec cms-staging-db pg_isready -U cms -d veridian_cms 2>/dev/null; then
                echo "Postgres ready after $((i*2))s"; break
              fi
              sleep 2
            done
          '

          # 2. Migrate via image builder (contient pnpm + payload CLI)
          ssh -i ~/.ssh/staging_key "$DEV_USER@$DEV_HOST" \
            "docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-builder:${IMAGE_TAG} && \
             docker run --rm \
               --network cms-staging_cms-internal \
               -e DATABASE_URL='postgresql://cms:${POSTGRES_PASSWORD}@cms-postgres:5432/veridian_cms' \
               -e PAYLOAD_SECRET='${PAYLOAD_SECRET}' \
               -e NODE_ENV=production \
               -e SERVER_URL=https://cms.staging.veridian.site \
               ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-builder:${IMAGE_TAG} \
               sh -c 'cd /app && pnpm payload migrate'"

          # 3. Up final du runner
          ssh -i ~/.ssh/staging_key "$DEV_USER@$DEV_HOST" \
            "cd ${{ env.STAGING_DIR }} && docker compose -p cms-staging --env-file .env -f compose/base.yml -f compose/staging.yml up -d --remove-orphans"

      - name: Wait for healthy
        env:
          DEV_HOST: ${{ vars.STAGING_HOST }}
          DEV_USER: ${{ vars.STAGING_USER }}
        run: |
          echo "Waiting for cms-staging to become healthy..."
          for i in $(seq 1 36); do
            STATUS=$(ssh -i ~/.ssh/staging_key "$DEV_USER@$DEV_HOST" \
              "docker inspect cms-staging --format '{{.State.Health.Status}}' 2>/dev/null" || echo "starting")
            if [ "$STATUS" = "healthy" ]; then
              echo "Healthy after $((i*10))s"
              exit 0
            fi
            sleep 10
          done
          echo "::error::cms-staging not healthy after 6min"
          ssh -i ~/.ssh/staging_key "$DEV_USER@$DEV_HOST" \
            "docker logs cms-staging --tail 200" || true
          exit 1

      - name: Smoke test staging URL
        run: |
          echo "Smoke: ${{ env.STAGING_URL }}/api/health"
          for i in $(seq 1 12); do
            if curl -sf --max-time 10 "${{ env.STAGING_URL }}/api/health" | grep -q '"status":"ok"'; then
              echo "✓ Staging healthy: ${{ env.STAGING_URL }}"
              exit 0
            fi
            echo "Attempt $i: not ready, retry 10s..."
            sleep 10
          done
          echo "::error::Smoke failed after 2min on ${{ env.STAGING_URL }}"
          exit 1

      - name: Cleanup
        if: always()
        run: |
          rm -f ~/.ssh/staging_key

  # Auto-promotion staging → main (trunk-based, cf CLAUDE.md racine §Règle d'or).
  # Déclenchée seulement si le job `deploy` est vert (staging healthy + smoke OK).
  # ff-merge uniquement (pas de merge commit, pas de force-push). Si non-ff (ex:
  # main a divergé), le job échoue et il faut investiguer manuellement.
  promote-to-main:
    name: Auto-promote staging → main
    needs: deploy
    runs-on: ubuntu-latest
    if: |
      github.ref == 'refs/heads/staging' &&
      github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          # PAT si dispo (bypass branch protection requiring status checks),
          # fallback GITHUB_TOKEN (suffit si pas de protection ou si checks
          # configurés en "auto-merge" mode).
          token: ${{ secrets.AUTO_PROMOTE_PAT || secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Fast-forward main to staging
        env:
          STAGING_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          git fetch origin main staging
          git checkout main
          # ff-only : si main a divergé de staging, le push échouera et il faut
          # rebaser staging sur main avant relance.
          if ! git merge --ff-only "$STAGING_SHA"; then
            echo "::error::main a divergé de staging — auto-promotion impossible."
            echo "Corriger : git checkout staging && git merge --ff-only origin/main && git push origin staging"
            exit 1
          fi
          git push origin main
          echo "✓ main avancé vers $STAGING_SHA (auto-promote)"

      # GitHub n'enchaîne PAS automatiquement les workflows quand le push est
      # effectué par GITHUB_TOKEN (sécurité anti-loop). On déclenche ci.yml
      # explicitement via workflow_dispatch pour que l'étage 3 prod tourne.
      - name: Trigger ci.yml on main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run ci.yml --ref main --repo ${{ github.repository }}
          echo "✓ ci.yml déclenché sur main"

      - name: Telegram notify
        if: always()
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "$TG_TOKEN" ] || [ -z "$TG_CHAT" ]; then exit 0; fi
          STATUS="${{ job.status }}"
          ICON="✓"; [ "$STATUS" != "success" ] && ICON="✗"
          SHA7=$(echo "${{ github.sha }}" | cut -c1-7)
          curl -sf -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            -d chat_id=${TG_CHAT} \
            -d "text=$ICON CMS auto-promote staging→main $STATUS (${SHA7})" \
            >/dev/null || true
