name: _audit-cve (reusable)

# Reusable CVE audit gate. Bloque sur npm/pnpm audit critical OU high.
# Référence: CLAUDE.md "Sécurité — règles non négociables" (post incident
# verger-shop 2026-05-07). Chaque app exposée internet doit appeler ce
# workflow avec son path + package manager.

on:
  workflow_call:
    inputs:
      app-path:
        description: "Chemin vers l'app (ex: hub, prospection, analytics, cms)"
        required: true
        type: string
      package-manager:
        description: "npm | pnpm"
        required: true
        type: string
      node-version:
        description: "Version Node"
        required: false
        type: string
        default: "22"
      pnpm-version:
        description: "Version pnpm (si pnpm)"
        required: false
        type: string
        default: "10"
      omit-dev:
        description: "Audit prod-only (recommandé pour apps déployées)"
        required: false
        type: boolean
        default: true

jobs:
  audit:
    name: CVE audit (high+critical bloquant)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.app-path }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        if: inputs.package-manager == 'pnpm'
        uses: pnpm/action-setup@v4
        with:
          version: ${{ inputs.pnpm-version }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          cache: ${{ inputs.package-manager }}
          cache-dependency-path: ${{ inputs.app-path }}/${{ inputs.package-manager == 'pnpm' && 'pnpm-lock.yaml' || 'package-lock.json' }}

      - name: Install (lockfile only — no scripts)
        run: |
          if [ "${{ inputs.package-manager }}" = "pnpm" ]; then
            pnpm install --frozen-lockfile --ignore-scripts || pnpm install --no-frozen-lockfile --ignore-scripts
          else
            npm ci --ignore-scripts || npm install --ignore-scripts
          fi

      - name: npm/pnpm audit (high + critical bloquant)
        run: |
          set +e
          OMIT_FLAG=""
          if [ "${{ inputs.omit-dev }}" = "true" ]; then
            OMIT_FLAG="--omit=dev"
          fi
          if [ "${{ inputs.package-manager }}" = "pnpm" ]; then
            # pnpm audit --prod equivalent à npm omit=dev. Affiche tout, gate sur high.
            if [ "${{ inputs.omit-dev }}" = "true" ]; then
              OUT=$(pnpm audit --prod --audit-level high 2>&1)
            else
              OUT=$(pnpm audit --audit-level high 2>&1)
            fi
          else
            OUT=$(npm audit $OMIT_FLAG --audit-level=high 2>&1)
          fi
          AUDIT_EXIT=$?
          echo "$OUT"
          # L'endpoint historique npm/pnpm audit est RETIRÉ (HTTP 410, 2026). pnpm
          # sort alors en erreur TRANSPORT, pas sur une vraie vuln → non-fatal. Le
          # scan de dépendances faisant autorité reste Trivy FS (job séparé, même CI,
          # qui lit pnpm-lock.yaml sans dépendre de cet endpoint).
          if echo "$OUT" | grep -qiE "ERR_PNPM_AUDIT_BAD_RESPONSE|being retired|responded with 410"; then
            echo "::warning::endpoint ${{ inputs.package-manager }} audit retiré (410) — gate CVE délégué à Trivy FS. Non-bloquant."
            exit 0
          fi
          if [ $AUDIT_EXIT -ne 0 ]; then
            echo ""
            echo "::error::CVE audit échoué — vulnérabilité high ou critical détectée."
            echo "::error::Voir CLAUDE.md 'Sécurité — règles non négociables' : on patch AVANT de déployer."
            echo "::error::Pour debug : cd ${{ inputs.app-path }} && ${{ inputs.package-manager }} audit --audit-level=high"
            exit 1
          fi
          echo "✓ Pas de CVE high/critical détectée"
