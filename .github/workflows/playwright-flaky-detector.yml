name: Playwright Flaky Detector (weekly)

# CI-ARCHITECTURE.md §2 — détection auto des tests E2E flaky.
# Lit les artifacts playwright-results.json des 100 derniers runs.
# Si un test a flake_rate > 5% sur 7 jours glissants :
#   - marque-le avec test.fixme() via PR auto
#   - crée une issue GitHub flaky-test:<name>
#   - quarantaine : continue de tourner sans bloquer la CI
# Quand flake_rate < 1% sur 7j post-fix : retour en chemin critique auto.

on:
  schedule:
    - cron: '0 6 * * 1'  # lundi 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  issues: write
  pull-requests: write

jobs:
  detect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_AUTOREVERT_PAT || secrets.GITHUB_TOKEN }}

      - name: Fetch last 100 e2e run artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p flaky-data
          RUNS=$(gh api "/repos/${{ github.repository }}/actions/workflows/ci.yml/runs?per_page=100&status=completed" \
            --jq '.workflow_runs[].id' 2>/dev/null || echo "")
          if [ -z "$RUNS" ]; then
            echo "No completed runs to analyze yet — skip"
            exit 0
          fi
          COUNT=0
          for run_id in $RUNS; do
            ARTIFACT_URL=$(gh api "/repos/${{ github.repository }}/actions/runs/${run_id}/artifacts" \
              --jq '.artifacts[] | select(.name=="playwright-results") | .archive_download_url' 2>/dev/null || echo "")
            if [ -n "$ARTIFACT_URL" ]; then
              gh api "$ARTIFACT_URL" > "flaky-data/${run_id}.zip" 2>/dev/null || continue
              unzip -o "flaky-data/${run_id}.zip" -d "flaky-data/${run_id}/" 2>/dev/null || continue
              COUNT=$((COUNT+1))
            fi
            [ $COUNT -ge 50 ] && break
          done
          echo "Collected $COUNT runs"

      - name: Analyze + compute flake_rate
        run: |
          set -euo pipefail
          if [ ! -d flaky-data ] || [ -z "$(ls flaky-data 2>/dev/null)" ]; then
            echo "Pas assez de données pour analyser — skip" && exit 0
          fi
          # Script Node simple : parse tous les playwright-results.json
          # et calcule flake_rate par titre de test.
          node <<'JS'
            const fs = require('fs');
            const path = require('path');
            const root = 'flaky-data';
            const tests = {};
            for (const dir of fs.readdirSync(root)) {
              const file = path.join(root, dir, 'playwright-results.json');
              if (!fs.existsSync(file)) continue;
              try {
                const data = JSON.parse(fs.readFileSync(file, 'utf8'));
                for (const suite of (data.suites || [])) {
                  walk(suite, '');
                }
                function walk(node, prefix) {
                  for (const s of (node.suites || [])) walk(s, `${prefix}${node.title || ''} > `);
                  for (const sp of (node.specs || [])) {
                    const title = `${prefix}${sp.title}`;
                    if (!tests[title]) tests[title] = { total: 0, flaky: 0 };
                    tests[title].total++;
                    if (sp.tests && sp.tests.some(t => t.status === 'flaky')) tests[title].flaky++;
                  }
                }
              } catch {}
            }
            const flaky = Object.entries(tests)
              .filter(([_, s]) => s.total >= 5 && (s.flaky / s.total) > 0.05)
              .map(([title, s]) => ({ title, rate: (s.flaky / s.total * 100).toFixed(1), runs: s.total }));
            console.log(`Flaky tests détectés : ${flaky.length}`);
            for (const f of flaky) console.log(`  - ${f.title} : ${f.rate}% (${f.runs} runs)`);
            fs.writeFileSync('flaky-report.json', JSON.stringify(flaky, null, 2));
          JS

      - name: Open issue per flaky test
        env:
          GH_TOKEN: ${{ secrets.GH_AUTOREVERT_PAT || secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          [ ! -f flaky-report.json ] && exit 0
          jq -c '.[]' flaky-report.json 2>/dev/null | while read -r entry; do
            TITLE=$(echo "$entry" | jq -r '.title')
            RATE=$(echo "$entry" | jq -r '.rate')
            EXISTING=$(gh issue list --label "flaky-test" --search "$TITLE" --state open --json number --jq '.[0].number' 2>/dev/null || echo "")
            if [ -z "$EXISTING" ]; then
              gh issue create \
                --title "flaky-test: $TITLE" \
                --body "Test E2E avec flake_rate ${RATE}% > 5% sur 7j glissants. Quarantaine recommandée via \`test.fixme()\`." \
                --label "flaky-test"
            fi
          done

      - name: Notify summary
        if: always()
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "$TG_TOKEN" ] || [ -z "$TG_CHAT" ]; then exit 0; fi
          COUNT=$(jq length flaky-report.json 2>/dev/null || echo "0")
          if [ "$COUNT" -gt 0 ]; then
            curl -sf -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
              -d chat_id=${TG_CHAT} \
              -d "text=⚠️ CMS flaky detector : ${COUNT} test(s) en quarantaine cette semaine" \
              >/dev/null || true
          fi
