name: CMS CI/CD

# Standard CI Veridian (cf veridian-platform/CI-ARCHITECTURE.md)
# Étages : 1 (quick checks) → 2 (build + scan) → 3 (deploy prod via Dokploy)
# Staging déployé séparément via cms-staging.yml sur push branche `staging`.

on:
  push:
    branches: [main]
    paths-ignore:
      - 'todo/**'
      - 'docs/**'
      - 'runbooks/**'
      - '_archive/**'
      - '**/*.md'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'todo/**'
      - 'docs/**'
      - 'runbooks/**'
      - '_archive/**'
      - '**/*.md'
  workflow_dispatch:

concurrency:
  group: ci-cms-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '10.28.1'
  REGISTRY: ghcr.io
  IMAGE_NAME: christ-roy/veridian-cms

permissions:
  contents: read
  packages: write
  security-events: write
  id-token: write

jobs:
  # ────────────────────────────────────────────────────────────────────────
  # ÉTAGE 1 — Quick checks (~60-90s)
  # ────────────────────────────────────────────────────────────────────────
  static:
    name: Static (lint + tsc + test-mapping + migration-safety)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # Diff origin/main → HEAD pour check-test-mapping
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      # --ignore-scripts : supply chain hardening (CI §17.2)
      # Whitelist explicite dans package.json#pnpm.onlyBuiltDependencies.
      - name: Install deps (ignore-scripts)
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: TypeScript typecheck
        run: pnpm exec tsc --noEmit

      - name: ESLint
        run: pnpm exec eslint . --quiet
        continue-on-error: true  # lint pas encore strict, à durcir progressivement

      - name: Test mapping (1 fichier critique = 1 test colocalisé)
        run: ./scripts/ci/check-test-mapping.sh
        env:
          BASE_REF: origin/${{ github.base_ref || 'main' }}

      - name: Migration safety (Expand & Contract)
        run: |
          if [ -x ./scripts/ci/check-migration-safety.sh ]; then
            ./scripts/ci/check-migration-safety.sh
          else
            echo "::warning::check-migration-safety.sh manquant, skip pour l'instant"
          fi

  # CVE audit (workflow réutilisable, déjà aligné --ignore-scripts)
  audit:
    name: CVE audit (high+critical bloquant)
    uses: ./.github/workflows/_audit-cve.yml
    with:
      app-path: .
      package-manager: pnpm
      node-version: "22"
      pnpm-version: "10.28.1"
      omit-dev: true

  # Trivy FS multi-scan étage 1 (vuln + misconfig + secret + license)
  trivy-fs:
    name: Trivy FS
    uses: ./.github/workflows/_trivy-fs.yml

  # Gitleaks (secrets dans diff git, complète Trivy secret scan)
  gitleaks:
    name: Gitleaks (secrets in git history)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Path-based staging gate : si push main touche fichiers structurels
  # (Dockerfile, src/payload.config.ts, src/migrations/**, compose/**,
  # docker-compose.yml, package.json, pnpm-lock.yaml) → exige un run staging
  # vert dans les 24h sur un ancêtre de HEAD.
  # Sur PR : on détecte mais on ne bloque pas (PR n'a pas accès à staging).
  structural-gate:
    name: Structural change gate (staging fresh)
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    outputs:
      has-structural: ${{ steps.detect.outputs.has-structural }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 50
      - name: Detect structural changes
        id: detect
        run: ./scripts/ci/check-structural-changes.sh || true
        env:
          BASE_REF: HEAD~1
      - name: Require staging fresh
        if: steps.detect.outputs.has-structural == 'true'
        run: ./scripts/ci/check-staging-fresh.sh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ────────────────────────────────────────────────────────────────────────
  # ÉTAGE 1 (bis) — Integration tests (Postgres réel)
  # ────────────────────────────────────────────────────────────────────────
  int:
    name: Integration tests (vitest + Postgres)
    needs: static
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: veridian_cms_test
          POSTGRES_USER: cms
          POSTGRES_PASSWORD: testpass
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432
    env:
      DATABASE_URL: postgresql://cms:testpass@localhost:5432/veridian_cms_test
      PAYLOAD_SECRET: ci_secret_not_for_prod_64chars_aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
      PAYLOAD_DB_PUSH: "false"
      NODE_ENV: test
      SERVER_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - name: Apply Payload migrations
        run: pnpm exec payload migrate
      - name: Run integration tests
        run: pnpm run test:int

  # ────────────────────────────────────────────────────────────────────────
  # ÉTAGE 2 — Build & push GHCR
  # ────────────────────────────────────────────────────────────────────────
  docker:
    name: Build & push image
    needs: [static, audit, int, trivy-fs, gitleaks, structural-gate]
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      image-sha: ${{ steps.version.outputs.image-sha }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version (auto-bump patch)
        id: version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PACKAGE_NAME="veridian-cms"
          EXISTING_TAGS=$(gh api \
            -H "Accept: application/vnd.github+json" \
            "/users/${{ github.repository_owner }}/packages/container/${PACKAGE_NAME}/versions" \
            --jq '.[].metadata.container.tags[]' 2>/dev/null || echo "")
          LATEST_TAG=$(echo "$EXISTING_TAGS" | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -uV | tail -n 1)
          if [ -z "$LATEST_TAG" ]; then
            VERSION="v0.1.0"
          else
            VERSION_WITHOUT_V=${LATEST_TAG#v}
            IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION_WITHOUT_V"
            PATCH=$((PATCH + 1))
            VERSION="v${MAJOR}.${MINOR}.${PATCH}"
          fi
          SHA7=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "image-sha=sha-${SHA7}" >> $GITHUB_OUTPUT
          echo "Building version: ${VERSION} (sha-${SHA7})"

      - name: Build and push runner (with retry)
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 20
          max_attempts: 3
          retry_wait_seconds: 30
          retry_on: error
          command: |
            docker buildx build \
              --target runner \
              --push \
              -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }} \
              -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.image-sha }} \
              -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
              -f ./Dockerfile \
              .

  # Trivy image scan (capacité 5 + SARIF 8)
  trivy-image:
    name: Trivy image
    needs: docker
    uses: ./.github/workflows/_trivy-image.yml
    with:
      image-ref: ghcr.io/christ-roy/veridian-cms:latest
      severity: 'CRITICAL,HIGH'
      ignore-unfixed: true

  # ────────────────────────────────────────────────────────────────────────
  # ÉTAGE 3 — Deploy prod via webhook Dokploy
  # ────────────────────────────────────────────────────────────────────────
  deploy-prod:
    name: Deploy → cms.veridian.site (Dokploy GitOps)
    needs: [docker, trivy-image]
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://cms.veridian.site/admin
    steps:
      - uses: actions/checkout@v6

      - name: Trigger Dokploy redeploy + retag rollback
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          VPS_HOST: ${{ vars.VPS_HOST }}
          VPS_USER: ${{ vars.VPS_USER }}
          DOKPLOY_COMPOSE_ID: ${{ vars.DOKPLOY_COMPOSE_ID }}
          IMAGE_VERSION: ${{ needs.docker.outputs.version }}
        run: |
          set -euo pipefail
          if [ -z "$SSH_KEY" ] || [ -z "$VPS_HOST" ] || [ -z "$DOKPLOY_COMPOSE_ID" ]; then
            echo "::error::Missing DEPLOY_SSH_KEY / VPS_HOST / DOKPLOY_COMPOSE_ID — abort"
            exit 1
          fi
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "$VPS_USER@$VPS_HOST" bash -s << DEPLOY
            set -e
            # Tag image actuelle comme :rollback avant pull (rollback express)
            CURRENT_ID=\$(docker images ghcr.io/christ-roy/veridian-cms:latest --format '{{.ID}}' 2>/dev/null || echo "")
            if [ -n "\$CURRENT_ID" ]; then
              docker tag "\$CURRENT_ID" ghcr.io/christ-roy/veridian-cms:rollback
              echo "Tagged current image as :rollback (\$CURRENT_ID)"
            fi
            # Pull la nouvelle image (idempotent, Dokploy refera de toute façon)
            docker pull ghcr.io/christ-roy/veridian-cms:${IMAGE_VERSION} || true
            # Trigger Dokploy compose.deploy via API locale (compose.deploy = re-clone + up)
            DKEY=\$(grep '^DOKPLOY_API_KEY=' ~/credentials/.all-creds.env | cut -d= -f2)
            curl -sf -X POST \
              -H "x-api-key: \$DKEY" \
              -H "Content-Type: application/json" \
              -d "{\"json\":{\"composeId\":\"$DOKPLOY_COMPOSE_ID\"}}" \
              http://localhost:3000/api/trpc/compose.deploy \
              && echo "CMS prod deploy triggered (compose=$DOKPLOY_COMPOSE_ID)"
          DEPLOY

      - name: Wait for healthy prod
        run: |
          echo "Waiting for cms.veridian.site/api/health..."
          for i in $(seq 1 18); do
            if curl -sf --max-time 10 https://cms.veridian.site/api/health | grep -q '"status":"ok"'; then
              echo "✓ CMS prod healthy after $((i*10))s"
              exit 0
            fi
            sleep 10
          done
          echo "::error::Health failed after 3min — triggering emergency rollback"
          exit 1

      - name: Smoke prod (admin + tenants API)
        env:
          CMS_ADMIN_API_KEY: ${{ secrets.CMS_ADMIN_API_KEY_PROD }}
        run: |
          set -e
          code=$(curl -s -o /dev/null -w "%{http_code}" https://cms.veridian.site/admin)
          [ "$code" = "200" ] || { echo "::error::admin retourne HTTP $code"; exit 1; }
          curl -sf -H "Authorization: users API-Key $CMS_ADMIN_API_KEY" \
            https://cms.veridian.site/api/tenants | grep -q '"docs"' \
            || { echo "::error::API tenants ne retourne pas de docs"; exit 1; }
          echo "✓ Smoke prod OK"

      - name: Trigger emergency rollback on failure
        if: failure()
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.GH_AUTOREVERT_PAT || secrets.GITHUB_TOKEN }}
          event-type: rollback_triggered
          client-payload: |
            {
              "app": "cms",
              "env": "prod",
              "reason": "deploy_smoke_failed",
              "sha": "${{ github.sha }}",
              "version": "${{ needs.docker.outputs.version }}"
            }

      - name: Telegram notify
        if: always()
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "$TG_TOKEN" ] || [ -z "$TG_CHAT" ]; then exit 0; fi
          STATUS="${{ job.status }}"
          ICON="✓"; [ "$STATUS" != "success" ] && ICON="✗"
          curl -sf -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            -d chat_id=${TG_CHAT} \
            -d "text=$ICON CMS prod $STATUS — ${{ needs.docker.outputs.version }} (${GITHUB_SHA:0:7})" \
            >/dev/null || true
