name: veridian-cms-prod

services:
  cms:
    image: veridian/cms-prod:latest
    build:
      context: .
      dockerfile: Dockerfile
    pull_policy: always
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: "3000"
      SERVER_URL: ${SERVER_URL:-https://cms.veridian.site}
      DATABASE_URL: postgresql://${POSTGRES_USER:-cms}:${POSTGRES_PASSWORD}@cms-postgres:5432/${POSTGRES_DB:-veridian_cms}
      NODE_OPTIONS: "--max-old-space-size=1024"
    depends_on:
      cms-postgres:
        condition: service_healthy
    volumes:
      - cms-media-prod:/app/media
    networks:
      - dokploy-network
      - default
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=dokploy-network"
      - "traefik.http.routers.veridian-cms-prod.rule=Host(`cms.veridian.site`)"
      - "traefik.http.routers.veridian-cms-prod.entrypoints=websecure"
      - "traefik.http.routers.veridian-cms-prod.tls=true"
      - "traefik.http.routers.veridian-cms-prod.tls.certresolver=letsencrypt"
      - "traefik.http.services.veridian-cms-prod.loadbalancer.server.port=3000"

  cms-postgres:
    image: postgres:16-alpine@sha256:20edbde7749f822887a1a022ad526fde0a47d6b2be9a8364433605cf65099416
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-veridian_cms}
      POSTGRES_USER: ${POSTGRES_USER:-cms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - cms-pgdata-prod:/var/lib/postgresql/data
    networks:
      - default
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cms} -d ${POSTGRES_DB:-veridian_cms}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  cms-pgdata-prod:
    name: veridian-cms-prod_cms-pgdata-prod
    external: true
  cms-media-prod:
    name: veridian-cms-prod_cms-media-prod
    external: true

networks:
  dokploy-network:
    external: true
